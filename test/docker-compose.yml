services:
  pgnbxplorer:
    restart: unless-stopped
    image: postgres:16
    container_name: bancod-pgnbxplorer
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - type: tmpfs
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nbxplorer -h 127.0.0.1 -p 5432"]
      interval: 2s
      timeout: 2s
      retries: 30

  nbxplorer:
    restart: unless-stopped
    container_name: bancod-nbxplorer
    image: nicolasdorier/nbxplorer:2.5.30
    environment:
      - NBXPLORER_NETWORK=regtest
      - NBXPLORER_CHAINS=btc
      - NBXPLORER_BTCRPCURL=http://bitcoin:18443
      - NBXPLORER_BTCNODEENDPOINT=bitcoin:18444
      - NBXPLORER_BTCRPCUSER=admin1
      - NBXPLORER_BTCRPCPASSWORD=123
      - NBXPLORER_VERBOSE=1
      - NBXPLORER_BIND=0.0.0.0:32838
      - NBXPLORER_TRIMEVENTS=10000
      - NBXPLORER_SIGNALFILESDIR=/datadir
      - NBXPLORER_POSTGRES=User ID=postgres;Host=bancod-pgnbxplorer;Port=5432;Application Name=nbxplorer;MaxPoolSize=20;Database=nbxplorer
      - NBXPLORER_EXPOSERPC=1
      - NBXPLORER_NOAUTH=1
    volumes:
      - type: tmpfs
        target: /datadir
    depends_on:
      pgnbxplorer:
        condition: service_healthy

  arkd-wallet:
    restart: unless-stopped
    image: ghcr.io/arkade-os/arkd-wallet:v0.9.3
    container_name: bancod-arkd-wallet
    depends_on:
      - nbxplorer
    ports:
      - "6160:6060"
    environment:
      - ARKD_WALLET_LOG_LEVEL=5
      - ARKD_WALLET_NBXPLORER_URL=http://bancod-nbxplorer:32838
      - ARKD_WALLET_NETWORK=regtest
      - ARKD_WALLET_SIGNER_KEY=1822f98b3a7366532d3a875fa94c97948fe8f6a71a0ca1e94587be5f4ce646d1
    volumes:
      - type: tmpfs
        target: /app/data

  arkd:
    image: ghcr.io/arkade-os/arkd:v0.9.3
    container_name: bancod-arkd
    restart: unless-stopped
    depends_on:
      - arkd-wallet
    ports:
      - "7170:7070"
      - "7171:7071"
    environment:
      - ARKD_LOG_LEVEL=5
      - ARKD_NO_MACAROONS=true
      - ARKD_VTXO_TREE_EXPIRY=40
      - ARKD_UNILATERAL_EXIT_DELAY=20
      - ARKD_PUBLIC_UNILATERAL_EXIT_DELAY=20
      - ARKD_BOARDING_EXIT_DELAY=30
      - ARKD_CHECKPOINT_EXIT_DELAY=10
      - ARKD_WALLET_ADDR=bancod-arkd-wallet:6060
      - ARKD_ESPLORA_URL=http://chopsticks:3000
      - ARKD_VTXO_MIN_AMOUNT=1
      - ARKD_LIVE_STORE_TYPE=inmemory
      - ARKD_EVENT_DB_TYPE=badger
      - ARKD_DB_TYPE=sqlite
      - ARKD_SESSION_DURATION=30
    volumes:
      - type: tmpfs
        target: /app/data

  introspector:
    image: ghcr.io/arklabshq/introspector:v0.0.1
    container_name: bancod-introspector
    restart: unless-stopped
    depends_on:
      - arkd
    ports:
      - "7173:7073"
    environment:
      - INTROSPECTOR_SECRET_KEY=f40f6e7a5cf262f4093d4605b8f40cbaf9da9e59bf32f24bb27a4ffc74f71eab
      - INTROSPECTOR_NO_TLS=true
      - INTROSPECTOR_LOG_LEVEL=5
      - INTROSPECTOR_ARKD_URL=bancod-arkd:7070
    volumes:
      - type: tmpfs
        target: /app/data

networks:
  default:
    name: nigiri
    external: true
